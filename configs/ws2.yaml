# configs/ws2.yaml
# WS-2: Method comparison at 3 obs positions, all 30 truth members
experiment: WS-2

paths:
  prepared: /path/to/state_ensemble.npz   # <- change this
  outdir:   /path/to/output/ws2/          # <- change this

state:
  var_idx: {qg: 0, qr: 1, qs: 2, T: 3, P: 4, u: 5, v: 6, w: 7}

obs:
  sigma_dbz: 5.0

# Three observation positions — update after running obs_explorer_ws2.ipynb
# Dummy values (0,0,0) used until positions are chosen
obs_positions:
  A_near_mean:  {x: 0, y: 0, z: 0}
  B_above_mean: {x: 0, y: 0, z: 0}
  C_below_mean: {x: 0, y: 0, z: 0}

da:
  ntemp: 3          # Ntemp for TEnKF/ATEnKF (fix from WS-1 results)
  alpha_s: 2.0
  loc_scales: [5, 5, 5]

experiment_tag: WS2_position_comparison
