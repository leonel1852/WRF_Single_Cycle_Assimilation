# configs/ws4.yaml
# WS-4: Multiple obs, uniform ::2 grid, WITH near-zero filtering
# Identical to WS-3 except filter_near_zero: true
# Runner: src/runners/run_full3d_multicycle_exps.py

paths:
  prepared: /path/to/state_ensemble.npz   # <- change this
  outdir:   /path/to/output/ws4/          # <- change this

state:
  var_idx: {qg: 0, qr: 1, qs: 2, T: 3, P: 4, u: 5, v: 6, w: 7}

obs:
  sigma_dbz: 5.0
  stride: 2
  filter_near_zero: true      # WS-4: drop near-zero departure points
  dbz_min: 5.0

da:
  ntemps:  [1, 3]             # update from WS-1 results
  alphas:  [2.0]
  loc_scales_list: [[5,5,5]]  # update from WS-1 results
  methods: [LETKF, TEnKF, AOEI, ATEnKF]
  n_members: 30

experiment_tag: WS4_multiobs_filtered
