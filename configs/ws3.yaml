# configs/ws3.yaml
# WS-3: Multiple obs, uniform ::2 grid, NO near-zero filtering
# Runner: src/runners/run_full3d_multicycle_exps.py

paths:
  prepared: /path/to/state_ensemble.npz   # <- change this
  outdir:   /path/to/output/ws3/          # <- change this

state:
  var_idx: {qg: 0, qr: 1, qs: 2, T: 3, P: 4, u: 5, v: 6, w: 7}

obs:
  sigma_dbz: 5.0
  stride: 2                   # obs every 2 grid points in x, y, z
  filter_near_zero: false     # WS-3: no near-zero filtering
  dbz_min: 5.0

da:
  ntemps:  [1, 3]             # update Ntemp from WS-1 results
  alphas:  [2.0]
  loc_scales_list: [[5,5,5]]  # update from WS-1 results
  methods: [LETKF, TEnKF, AOEI, ATEnKF]
  n_members: 30

experiment_tag: WS3_multiobs_unfiltered
