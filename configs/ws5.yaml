# configs/ws5.yaml
# WS-5: Localization and inflation tuning grid
# Uses the 2-3 best methods from WS-2/3/4, sweeps loc_scales and ntemps
# Runner: src/runners/run_full3d_multicycle_exps.py

paths:
  prepared: /path/to/state_ensemble.npz   # <- change this
  outdir:   /path/to/output/ws5/          # <- change this

state:
  var_idx: {qg: 0, qr: 1, qs: 2, T: 3, P: 4, u: 5, v: 6, w: 7}

obs:
  sigma_dbz: 5.0
  stride: 2
  filter_near_zero: true      # use filtered obs (WS-4 setup)
  dbz_min: 5.0

da:
  ntemps:  [3]                # fix Ntemp from WS-1
  alphas:  [2.0]
  # Tuning grid: loc_scales and ntemps will be expanded once WS-1 results are in
  loc_scales_list:
    - [3, 3, 3]
    - [5, 5, 5]
    - [7, 7, 7]
    - [10, 10, 10]
  methods: [TEnKF, ATEnKF]    # best 2-3 methods from WS-2/3/4
  n_members: 30

experiment_tag: WS5_tuning_grid
